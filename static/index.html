<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>狗狗丰容路线规划器</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- ── 顶部栏 ─────────────────────────────────────────────────── -->
  <header class="header">
    <span class="header-logo">🐾</span>
    <span class="header-title">狗狗丰容路线规划器</span>
    <span class="header-badge">上海 · Beta</span>
  </header>

  <div class="layout">

    <!-- ── 侧边栏 问卷 ──────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-inner">

        <!-- Q1: 地点 -->
        <div class="form-section">
          <div class="section-label">📍 遛狗地点</div>
          <select id="district-select" class="select">
            <option value="">请选择行政区</option>
            <option>杨浦区</option><option>徐汇区</option>
            <option>静安区</option><option>黄浦区</option>
            <option>长宁区</option><option>普陀区</option>
            <option>虹口区</option><option>浦东新区</option>
            <option>宝山区</option><option>闵行区</option>
          </select>
        </div>

        <!-- Q2: 品种 -->
        <div class="form-section">
          <div class="section-label">🐶 品种</div>
          <select id="breed-select" class="select">
            <option value="">请选择品种</option>
            <!-- 由 JS 动态填充 -->
            <option value="__custom__">不确定 / 不在列表中</option>
          </select>

          <!-- 非品种犬形态问卷 -->
          <div id="custom-fields" class="custom-fields hidden">
            <div class="field-group">
              <label>体重大约是？</label>
              <div class="seg-group" id="weight-group">
                <button class="seg active" data-value="5kg以下">5kg以下</button>
                <button class="seg" data-value="5–15kg">5–15kg</button>
                <button class="seg" data-value="15–30kg">15–30kg</button>
                <button class="seg" data-value="30kg以上">30kg以上</button>
              </div>
            </div>
            <div class="field-group">
              <label>是否短鼻？（脸扁平、鼻内凹，如巴哥/斗牛形态）</label>
              <div class="seg-group" id="brachy-group">
                <button class="seg active" data-value="false">否</button>
                <button class="seg" data-value="true">是</button>
              </div>
            </div>
            <div class="field-group">
              <label>是否短腿？（腿相对身体明显偏短，如腊肠犬形态）</label>
              <div class="seg-group" id="short-leg-group">
                <button class="seg active" data-value="false">否</button>
                <button class="seg" data-value="true">是</button>
              </div>
            </div>
            <div class="field-group">
              <label>毛发长度</label>
              <div class="seg-group" id="coat-group">
                <button class="seg" data-value="短毛">短毛</button>
                <button class="seg active" data-value="中长毛">中长毛</button>
                <button class="seg" data-value="长毛">长毛</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Q3: 年龄与健康 -->
        <div class="form-section">
          <div class="section-label">📅 年龄与健康</div>
          <div class="field-group">
            <label>年龄</label>
            <div class="seg-group" id="age-group">
              <button class="seg" data-value="0.5">0–1岁</button>
              <button class="seg active" data-value="3">1–6岁</button>
              <button class="seg" data-value="8">6–10岁</button>
              <button class="seg" data-value="11">10岁以上</button>
            </div>
          </div>
          <div class="field-group">
            <label>是否有关节问题或不适宜爬坡蹦跳的疾病？</label>
            <div class="seg-group" id="joint-group">
              <button class="seg active" data-value="false">否</button>
              <button class="seg" data-value="true">是</button>
              <button class="seg" data-value="null">不确定</button>
            </div>
          </div>
        </div>

        <!-- Q4: 景观偏好 -->
        <div class="form-section">
          <div class="section-label">🌿 景观与风格</div>
          <div class="field-group">
            <label>希望看到的风景（可多选）</label>
            <div class="check-group" id="landscape-group">
              <label class="check-item">
                <input type="checkbox" value="绿地与公园" checked>
                <span>🌳 绿地与公园</span>
              </label>
              <label class="check-item">
                <input type="checkbox" value="河道与水景">
                <span>🌊 河道与水景</span>
              </label>
              <label class="check-item">
                <input type="checkbox" value="热闹商业街区">
                <span>🏪 热闹商业街区</span>
              </label>
            </div>
          </div>
          <div class="field-group">
            <label>路线风格</label>
            <div class="seg-group" id="quiet-group">
              <button class="seg active" data-value="安静小路">安静小路</button>
              <button class="seg" data-value="都可以">都可以</button>
              <button class="seg" data-value="热闹街道">热闹街道</button>
            </div>
          </div>
        </div>

        <!-- Q5: 时长 -->
        <div class="form-section">
          <div class="section-label">⏱ 遛狗时长</div>
          <div class="seg-group seg-col" id="duration-group">
            <button class="seg" data-value="1.5">10–20 分钟（轻松散步）</button>
            <button class="seg active" data-value="3.5">20–40 分钟（适度活动）</button>
            <button class="seg" data-value="99">40 分钟以上（充分运动）</button>
          </div>
        </div>

        <button id="generate-btn" class="generate-btn" disabled>
          🐾 生成推荐路线
        </button>

      </div><!-- /sidebar-inner -->
    </aside>

    <!-- ── 主区域 地图 + 结果 ───────────────────────────────────── -->
    <main class="main">

      <!-- 地图 -->
      <div id="map"></div>

      <!-- 加载遮罩 -->
      <div id="loading" class="overlay hidden">
        <div class="loading-box">
          <div class="spinner"></div>
          <p id="loading-text">正在加载路网…</p>
          <p class="loading-sub">首次加载某个区约需 1–2 分钟，后续有缓存会更快</p>
        </div>
      </div>

      <!-- 欢迎页（未生成时） -->
      <div id="welcome" class="overlay welcome-overlay">
        <div class="welcome-box">
          <div class="welcome-icon">🐾</div>
          <p class="welcome-title">在左侧填写信息，点击生成推荐路线</p>
          <div class="welcome-features">
            <div class="feature-item">
              <span class="fi">📍</span>
              <span>选择行政区</span>
            </div>
            <div class="feature-item">
              <span class="fi">🐶</span>
              <span>填写犬种信息</span>
            </div>
            <div class="feature-item">
              <span class="fi">🗺️</span>
              <span>获取 Top-3 路线</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 结果面板 -->
      <div id="results" class="results hidden">
        <div id="alerts-area"></div>
        <div id="route-cards" class="route-cards"></div>
        <table id="score-table" class="score-table">
          <thead>
            <tr id="score-head"></tr>
          </thead>
          <tbody id="score-body"></tbody>
        </table>
        <div id="constraints-strip" class="constraints-strip"></div>
      </div>

    </main>
  </div><!-- /layout -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
